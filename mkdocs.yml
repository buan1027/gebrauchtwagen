site_name: gebrauchtwagen

nav:
  - Start: index.md
  - Use Cases: use-cases.md
  - Komponentendiagramm: komponentendiagramm.md
  - Schichtenarchitektur: schichtenarchitektur.md
  - ER-Diagramm: er-diagramm.md
  - API-Dokumentation:
      - __init__: modules/__init__.md
      - REST-Schnittstelle: modules/rest.md
      - GraphQL-Schnittstelle: modules/graphql.md
      - Geschäftslogik: modules/service.md
      - Datenbankzugriffsschicht: modules/repository.md
      - Geschäftsobjekte: modules/entity.md
      - Authentifizierung und Autorisierung: modules/security.md
  - DB-Coding: db-coding.md
  - Lokales Setup: local-setup.md
  - Tests: testing.md
  - Bruno Requests: bruno.md
  - Keycloak: keycloak.md
  - Dependency-Check: dependency-check.md
  - Git-Workflow: git-workflow.md
  - Troubleshooting: troubleshooting.md

theme:
  name: material
  language: de
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Automatisches Farbschema
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Dunkles Farbschema
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Helles Farbschema

markdown_extensions:
  - toc:
      permalink: true

watch:
  - docs
  - mkdocs.yml
  - src/gebrauchtwagen

strict: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: sphinx
            show_source: false
            show_docstring_modules: true
            show_docstring_classes: true
            show_docstring_functions: true
  - build_plantuml:
      render: "server"
      server: "http://www.plantuml.com/plantuml"
      disable_ssl_certificate_validation: true
      output_format: "svg"
      diagram_root: "docs/diagramme"
      output_folder: "out"
      input_folder: "src"
      input_extensions: "plantuml"
