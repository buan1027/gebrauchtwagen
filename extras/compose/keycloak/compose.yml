# Aufruf: docker compose up

services:
  keycloak:
    image: dhi.io/keycloak:26.5.5-debian13
    command: ["start", "--hostname-strict=false"]
    ports:
      - published: 8880
        target: 8080
      - published: 8843
        target: 8443
      - published: 9990
        target: 9000
    volumes:
      - kc_data:/opt/keycloak/data
      - kc_tls:/opt/keycloak/tls:ro
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: tmp
      KC_BOOTSTRAP_ADMIN_PASSWORD: p
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/tls/kc_cert
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/tls/kc_key
      KC_HTTPS_PROTOCOLS: "TLSv1.3"
      KC_HTTP_ENABLED: true
      KC_LOG_CONSOLE_COLOR: true
      KC_HEALTH_ENABLED: true
    hostname: keycloak
    container_name: keycloak
    user: nonroot:nonroot
    cap_drop: [ALL]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;",
        ]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 30s
    restart: unless-stopped

volumes:
  kc_data:
    name: kc_data
    external: true
  kc_tls:
    name: kc_tls
    external: true
