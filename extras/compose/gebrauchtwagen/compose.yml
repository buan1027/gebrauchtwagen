# Aufruf:   docker compose up
#           docker compose down

# https://docs.docker.com/compose/compose-file
# https://github.com/compose-spec/compose-spec/blob/master/schema/compose-spec.json
# https://docs.docker.com/reference/compose-file/include

include:
  - path: ../backend/compose.yml

services:
  app:
    image: gebrauchtwagen:0.1.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GEBRAUCHTWAGEN_SERVER_HOST: 0.0.0.0
      GEBRAUCHTWAGEN_SERVER_PORT: 8000
      GEBRAUCHTWAGEN_DB_HOST: db
      GEBRAUCHTWAGEN_DB_PORT: 5432
      GEBRAUCHTWAGEN_DB_NAME: gebrauchtwagen
      GEBRAUCHTWAGEN_DB_USERNAME: gebrauchtwagen
      GEBRAUCHTWAGEN_DB_PASSWORD: gebrauchtwagen
    ports:
      - published: 8000
        target: 8000
    stop_signal: SIGINT
    hostname: gebrauchtwagen
    cap_drop: [ALL]
